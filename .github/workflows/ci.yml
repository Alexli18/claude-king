name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -timeout 60s

      - name: Build
        run: |
          go build -o /dev/null ./cmd/king
          go build -o /dev/null ./cmd/king-vassal
          go build -o /dev/null ./cmd/kingctl
