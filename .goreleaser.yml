# .goreleaser.yml
version: 2

project_name: claude-king

before:
  hooks:
    - go mod tidy

builds:
  - id: king
    binary: king
    main: ./cmd/king
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: king-vassal
    binary: king-vassal
    main: ./cmd/king-vassal
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w

  - id: kingctl
    binary: kingctl
    main: ./cmd/kingctl
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env: [CGO_ENABLED=0]
    ldflags:
      - -s -w

archives:
  - format: binary
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^Merge"
